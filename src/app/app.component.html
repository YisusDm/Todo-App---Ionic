<ion-app>
  <!-- Global app bar -->
  <div class="app-bar">
    <span class="app-bar-title">To Do App</span>
  </div>

  <ion-router-outlet></ion-router-outlet>

  <!-- Bottom nav — TarkLoud style, green brand -->
  <nav class="bottom-nav">
    <button class="nav-item" [class.active]="activeTab === 'tasks'" (click)="navigateTo('/tasks')">
      <ion-icon [name]="activeTab === 'tasks' ? 'checkbox' : 'checkbox-outline'"></ion-icon>
      <span>Tareas</span>
    </button>
    <button
      *ngIf="enableCategories$ | async"
      class="nav-item"
      [class.active]="activeTab === 'categories'"
      (click)="navigateTo('/categories')">
      <ion-icon [name]="activeTab === 'categories' ? 'pricetags' : 'pricetags-outline'"></ion-icon>
      <span>Categorías</span>
    </button>
  </nav>

  <!-- Global notification modal -->
  <app-notification></app-notification>
</ion-app>
