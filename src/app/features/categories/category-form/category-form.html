<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="cancel()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Editar categoría' : 'Nueva categoría' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Preview en vivo -->
  <div class="preview-container">
    <div class="preview-card" [style.border-left-color]="form.get('color')?.value">
      <div class="preview-dot" [style.background]="form.get('color')?.value"></div>
      <span class="preview-name">
        {{ form.get('name')?.value || 'Nombre de categoría' }}
      </span>
    </div>
  </div>

  <form [formGroup]="form">

    <!-- Nombre -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Nombre *</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-input
          formControlName="name"
          placeholder="Ej: Trabajo, Personal, Urgente..."
          [counter]="true"
          maxlength="30"
          clearInput>
        </ion-input>
        <ion-note color="danger" *ngIf="nameControl.invalid && nameControl.touched">
          <span *ngIf="nameControl.errors?.['required']">El nombre es requerido</span>
          <span *ngIf="nameControl.errors?.['minlength']">Mínimo 2 caracteres</span>
        </ion-note>
      </ion-card-content>
    </ion-card>

    <!-- Color -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Color</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <div class="color-grid">
          <button
            *ngFor="let color of PRESET_COLORS"
            type="button"
            class="color-btn"
            [style.background]="color.hex"
            [class.selected]="form.get('color')?.value === color.hex"
            (click)="selectColor(color.hex)">
            <ion-icon
              *ngIf="form.get('color')?.value === color.hex"
              name="checkmark"
              class="check-icon"
              [style.color]="color.checkColor">
            </ion-icon>
          </button>
        </div>
      </ion-card-content>
    </ion-card>

  </form>
</ion-content>

<ion-footer class="ion-no-border form-footer">
  <ion-toolbar>
    <div class="footer-btn-wrap">
      <ion-button
        expand="block"
        shape="round"
        (click)="save()"
        [disabled]="form.invalid"
        class="save-btn">
        <ion-icon [name]="isEdit ? 'save-outline' : 'add-circle-outline'" slot="start"></ion-icon>
        {{ isEdit ? 'Guardar cambios' : 'Crear categoría' }}
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
